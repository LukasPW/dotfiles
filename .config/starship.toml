add_newline = false

format = "$username$hostname$directory$git_branch $character"

[username]
show_always = false
style_user = "#5f87ff"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "#5f87ff"
format = "[@$hostname ]($style)"

[directory]
style = "#af87ff"
format = "[$path]($style)"
truncation_length = 0
truncate_to_repo = false

[git_branch]
symbol = ""
style = "#d787ff"
format = " ([($branch)]($style))"

[character]
success_symbol = "[➜](bold #ff5fd7)"
error_symbol = "[➜](bold red)"
vicmd_symbol = "[❮](bold yellow)"
